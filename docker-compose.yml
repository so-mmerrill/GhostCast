version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ghostcast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ghostcast-net

  redis:
    image: redis:7-alpine
    container_name: ghostcast-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes
    networks:
      - ghostcast-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ghostcast-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      API_PORT: ${API_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX}
      LOGIN_RATE_LIMIT_TTL: ${LOGIN_RATE_LIMIT_TTL}
      LOGIN_RATE_LIMIT_MAX: ${LOGIN_RATE_LIMIT_MAX}
      # SSO (optional)
      SAML_ENABLED: ${SAML_ENABLED}
      SAML_ENTRY_POINT: ${SAML_ENTRY_POINT}
      SAML_ISSUER: ${SAML_ISSUER}
      SAML_CERT: ${SAML_CERT}
      SAML_CALLBACK_URL: ${SAML_CALLBACK_URL}
      # Backup
      BACKUP_DIRECTORY: ${BACKUP_DIRECTORY}
    volumes:
      - backup_data:/app/backups
    expose:
      - '${API_PORT}'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:${API_PORT:-4000}/api/health || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - ghostcast-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ghostcast-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT}:${WEB_PORT}'
    volumes:
      - ./certs:/etc/nginx/ssl:ro
    networks:
      - ghostcast-net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- --no-check-certificate https://127.0.0.1/health || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  backup_data:

networks:
  ghostcast-net:
    driver: bridge
